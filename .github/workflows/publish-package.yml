name: Publish Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and optionally publish
        required: false
        default: main
      publish_to_npm:
        description: Publish to npm after building and verifying the full native matrix
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-package-${{ github.event.release.tag_name || github.event.inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl') && startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native binary
        run: bun run build:native --target ${{ matrix.target }}

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: native/*.node
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_npm == 'true')
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify pushed tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "release tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Verify manual publish ref version
        if: github.event_name == 'workflow_dispatch'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "manual publish for ref '${{ github.event.inputs.ref }}' with package version ${PKG_VERSION}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts

      - name: Collect binaries
        run: |
          mkdir -p native
          find native-artifacts -name '*.node' -exec cp {} native/ \;

      - name: Verify packaged binaries
        run: ls -la native

      - name: Test and build package
        run: |
          bun run typecheck
          bun test
          bun run build

      - name: Verify packed release contents
        env:
          TREBIRED_LOGGER_VERIFY_NATIVE_SCOPE: matrix
        run: bun run verify:pack

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
